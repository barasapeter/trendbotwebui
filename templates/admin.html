<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/static/favicon.jpeg">
    <title>Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-left">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="10" rx="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>
                <div>
                    <div class="eyebrow">Access control</div>
                    <h1>Authorized users</h1>
                </div>
            </div>
            <span class="counter" id="userCount"><span class="dot"></span>0 active</span>
        </div>

        <p class="lede">Anyone on this list can sign in. Grant access by email, revoke it any time.</p>

        <div class="input-group">
            <div class="input-wrapper">
                <input type="email" id="emailInput" placeholder="name@company.com" autocomplete="email">
                <div class="input-error" id="errorMessage">Enter a valid email address</div>
            </div>
            <button class="btn btn-primary" id="addButton">
                <span class="btn-icon">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </span>
                Grant access
            </button>
        </div>

        <div class="ledger-label">Ledger</div>
        <div class="ledger">
            <ul class="user-list" id="userList"></ul>
        </div>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <!-- Bridges the server-rendered user list to the external script below.
         type="application/json" keeps this from being parsed/linted as JS. -->
    <script id="initial-users" type="application/json">{{ authorized_users | tojson | safe }}</script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
