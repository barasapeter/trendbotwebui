<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">

        <header class="topbar">
            <div class="brand">
                <span class="conn-dot down" id="connDot"></span>
                <span>Trading Session</span>
            </div>
            <div style="display:flex; align-items:center; gap:16px;">
                <span class="conn-label" id="connLabel">Connecting…</span>
                <button class="btn-settings" type="button">Settings</button>
            </div>
        </header>

        <section class="readout" aria-label="Account readout">
            <div class="readout-cell">
                <span class="readout-label">Balance</span>
                <span class="readout-value" id="balance">{{ balance or "0.00" }}</span>
            </div>
            <div class="readout-cell">
                <span class="readout-label">Session P&amp;L</span>
                <span class="readout-value" id="PL">{{ PL or "0.00" }}</span>
            </div>
        </section>

        <div class="controls">
            <div class="mode-toggle" role="group" aria-label="Account mode">
                <button class="mode-btn active" data-mode="demo" type="button">Demo</button>
                <button class="mode-btn" data-mode="real" type="button">Real</button>
            </div>
            <button class="btn-run" id="runBtn" type="button" disabled>Run Bot</button>
        </div>

        <section class="panel">
            <h2 class="panel-header">Live Session Feed</h2>
            <div class="waiting-indicator" id="waitingIndicator">
                <span class="waiting-dots">
                    <span class="waiting-dot"></span>
                    <span class="waiting-dot"></span>
                    <span class="waiting-dot"></span>
                </span>
                <span id="waitingText">Connecting…</span>
            </div>
            <div class="feed-body" id="feedBody">
                <p class="feed-empty">Trade activity will appear here once the bot is running.</p>
            </div>
        </section>

    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
