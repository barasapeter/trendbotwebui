<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/static/favicon.jpeg">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">

        <header class="topbar">
            <div class="brand">
                <span class="conn-dot down" id="connDot"></span>
                <span class="conn-label" id="connLabel">Connecting…</span>
            </div>
            <div style="display:flex; align-items:center; gap:16px;">                
                <button class="btn-settings" type="button">Settings</button>
            </div>
        </header>

        <section class="readout" aria-label="Account readout" style="height: 100px;">
            <div class="readout-cell">
                <span class="readout-label">Balance USD</span>
                <span class="readout-value" id="balance">
                    {% if balance is none %}
                        <em style="font-size: 16px;">Fetching...</em>
                    {% else %}
                        {{ balance }}
                    {% endif %}
                </span>
            </div>
            <div class="readout-cell">
                <span class="readout-label">Session P&amp;L USD</span>
                <span class="readout-value" id="PL">
                    {% if PL is none %}
                        <em style="font-size: 16px;">Fetching...</em>
                    {% else %}
                        {{ PL }}
                    {% endif %}
                </span>
            </div>
        </section>

        <div class="controls">
            <div class="mode-toggle" role="group" aria-label="Account mode">
                <button class="mode-btn active" data-mode="demo" type="button">Demo</button>
                <button class="mode-btn" data-mode="real" type="button">Real</button>
            </div>
            <div style="background-color: #FF0033; border-radius: 9999px; padding-left: 10px; 
                border: 1px solid #eae8f3;
                border-radius: 999px;
                padding: 4px;
                gap: 3px;
                box-shadow: 0 1px 4px rgba(44, 43, 53, 0.03);">
                <span style="color: #fff; font-size: 10px; font-weight: 999;"><strong>RT%</strong></span>
                <input class="RT" type="number" min="3" max="85" id="lossTolerance" placeholder="Risk Tolerance" value="1" required>
            </div>
            <button class="btn-run" id="runBtn" type="button" disabled>Run Bot</button>
        </div>

        <section class="panel">

            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; padding: unset; margin: unset;">
                <h2 class="panel-header">Trade Feed</h2>
                <button id="stopBtn" class="btn-settings" style="display: none; margin: unset;">Stop</button>
            </div>     
            <div class="waiting-indicator" id="waitingIndicator" style="padding: unset; margin: unset; margin-bottom: 10px;">
                <span class="waiting-dots">
                    <span class="waiting-dot"></span>
                    <span class="waiting-dot"></span>
                    <span class="waiting-dot"></span>
                </span>
                <span id="waitingText">Connecting…</span>
            </div>
            <div class="feed-body" id="feedBody" style="padding: unset; margin: unset;">
                <!-- <p class="feed-empty" style="font-size: 10px;">
                    <strong>RISK WARNING</strong><br>
                    Follow recommended patterns and only stake what you can afford to lose.
                </p> -->
            </div>
        </section>

    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
